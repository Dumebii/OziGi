<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#070E1C"/>
      <stop offset="100%" stop-color="#0A1A2E"/>
    </linearGradient>
    <radialGradient id="glow" cx="70%" cy="55%" r="40%">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="20%" cy="20%" r="30%">
      <stop offset="0%" stop-color="#E8320A" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#0A1628" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Grid -->
  <g stroke="#1E293B" stroke-width="1" opacity="0.45">
    <line x1="580" y1="60"  x2="1160" y2="60"/>
    <line x1="580" y1="150" x2="1160" y2="150"/>
    <line x1="580" y1="240" x2="1160" y2="240"/>
    <line x1="580" y1="330" x2="1160" y2="330"/>
    <line x1="580" y1="420" x2="1160" y2="420"/>
    <line x1="580" y1="510" x2="1160" y2="510"/>
    <line x1="580" y1="600" x2="1160" y2="600"/>
    <line x1="630"  y1="40" x2="630"  y2="590"/>
    <line x1="720"  y1="40" x2="720"  y2="590"/>
    <line x1="810"  y1="40" x2="810"  y2="590"/>
    <line x1="900"  y1="40" x2="900"  y2="590"/>
    <line x1="990"  y1="40" x2="990"  y2="590"/>
    <line x1="1080" y1="40" x2="1080" y2="590"/>
  </g>

  <!-- RAG pipeline visual nodes on right -->
  <!-- Retrieve box -->
  <rect x="660" y="100" width="150" height="56" rx="8" fill="#1E293B" stroke="#6366F1" stroke-width="1.5"/>
  <text x="735" y="128" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="14" font-weight="600" fill="#FAFAFA">Retrieve</text>
  <text x="735" y="146" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="11" fill="#94A3B8">Vector DB query</text>

  <!-- Augment box -->
  <rect x="840" y="220" width="150" height="56" rx="8" fill="#1E293B" stroke="#6366F1" stroke-width="1.5"/>
  <text x="915" y="248" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="14" font-weight="600" fill="#FAFAFA">Augment</text>
  <text x="915" y="266" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="11" fill="#94A3B8">Inject context</text>

  <!-- Generate box -->
  <rect x="660" y="340" width="150" height="56" rx="8" fill="#1E293B" stroke="#E8320A" stroke-width="1.5"/>
  <text x="735" y="368" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="14" font-weight="600" fill="#E8320A">Generate</text>
  <text x="735" y="386" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="11" fill="#94A3B8">LLM response</text>

  <!-- Connector lines between boxes -->
  <path d="M810 128 Q830 128 840 220" fill="none" stroke="#6366F1" stroke-width="1.5" opacity="0.6"/>
  <path d="M840 276 Q820 310 810 340" fill="none" stroke="#6366F1" stroke-width="1.5" opacity="0.6"/>

  <!-- Active glow on generate -->
  <circle cx="735" cy="368" r="6" fill="#E8320A" opacity="0.3"/>

  <!-- Data source labels -->
  <text x="1020" y="110" font-family="'DM Sans','Inter',sans-serif" font-size="11" fill="#94A3B8">Enterprise docs</text>
  <line x1="810" y1="110" x2="1010" y2="110" stroke="#1E293B" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="1020" y="250" font-family="'DM Sans','Inter',sans-serif" font-size="11" fill="#94A3B8">Prompt template</text>
  <line x1="990" y1="248" x2="1010" y2="248" stroke="#1E293B" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="1020" y="370" font-family="'DM Sans','Inter',sans-serif" font-size="11" fill="#94A3B8">Grounded output</text>
  <line x1="810" y1="368" x2="1010" y2="368" stroke="#1E293B" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- Circuit traces background -->
  <g fill="none" stroke="#1E2A3F" stroke-width="1" opacity="0.5">
    <path d="M630 420 L630 510 L720 510"/>
    <path d="M900 60 L900 150 L990 150"/>
    <path d="M1080 240 L1080 330 L990 330"/>
    <path d="M720 420 L720 510"/>
    <path d="M990 420 L990 510 L1080 510"/>
  </g>
  <g fill="#1E3A5F" opacity="0.7">
    <circle cx="630" cy="510" r="4"/>
    <circle cx="900" cy="150" r="4"/>
    <circle cx="990" cy="330" r="4"/>
  </g>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="#E8320A"/>

  <!-- Category -->
  <text x="80" y="118" font-family="'DM Sans','Inter',sans-serif" font-size="14" font-weight="600" fill="#E8320A" letter-spacing="3">ENGINEERING  ·  APRIL 2026</text>

  <!-- Title -->
  <text x="80" y="210" font-family="'DM Sans','Inter','Helvetica Neue',sans-serif" font-size="68" font-weight="800" fill="#FAFAFA">RAG for</text>
  <text x="80" y="292" font-family="'DM Sans','Inter','Helvetica Neue',sans-serif" font-size="68" font-weight="800" fill="#FAFAFA">Enterprise</text>
  <text x="80" y="374" font-family="'DM Sans','Inter','Helvetica Neue',sans-serif" font-size="68" font-weight="800" fill="#6366F1">Data.</text>

  <!-- Subtitle -->
  <text x="80" y="420" font-family="'DM Sans','Inter',sans-serif" font-size="24" fill="#94A3B8">A technical blueprint for building</text>
  <text x="80" y="452" font-family="'DM Sans','Inter',sans-serif" font-size="24" fill="#94A3B8">retrieval-augmented generation pipelines.</text>

  <!-- Divider -->
  <line x1="80" y1="480" x2="460" y2="480" stroke="#1E293B" stroke-width="1"/>

  <!-- Pills -->
  <rect x="80"  y="496" width="120" height="36" rx="18" fill="#1E293B"/>
  <text x="140" y="519" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="13" fill="#FAFAFA">8 min read</text>
  <rect x="212" y="496" width="168" height="36" rx="18" fill="#1E293B"/>
  <text x="296" y="519" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="13" fill="#FAFAFA">Reduce hallucinations</text>

  <!-- Wordmark -->
  <text x="80"  y="598" font-family="'DM Sans','Inter',sans-serif" font-size="13" font-weight="700" fill="#E8320A" letter-spacing="3">OZIGI</text>
  <text x="136" y="598" font-family="'DM Sans','Inter',sans-serif" font-size="13" fill="#94A3B8" opacity="0.7">  ·  blog.ozigi.app</text>
</svg>
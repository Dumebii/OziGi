<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#070E1C"/>
      <stop offset="100%" stop-color="#0A1A2E"/>
    </linearGradient>
    <radialGradient id="glowL" cx="25%" cy="50%" r="35%">
      <stop offset="0%" stop-color="#4285F4" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#4285F4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowR" cx="78%" cy="50%" r="35%">
      <stop offset="0%" stop-color="#CC785C" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#CC785C" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glowL)"/>
  <rect width="1200" height="630" fill="url(#glowR)"/>

  <!-- Grid -->
  <g stroke="#1E293B" stroke-width="1" opacity="0.4">
    <line x1="40"   y1="80"  x2="1160" y2="80"/>
    <line x1="40"   y1="170" x2="1160" y2="170"/>
    <line x1="40"   y1="260" x2="1160" y2="260"/>
    <line x1="40"   y1="350" x2="1160" y2="350"/>
    <line x1="40"   y1="440" x2="1160" y2="440"/>
    <line x1="40"   y1="530" x2="1160" y2="530"/>
    <line x1="120"  y1="40"  x2="120"  y2="590"/>
    <line x1="300"  y1="40"  x2="300"  y2="590"/>
    <line x1="480"  y1="40"  x2="480"  y2="590"/>
    <line x1="660"  y1="40"  x2="660"  y2="590"/>
    <line x1="840"  y1="40"  x2="840"  y2="590"/>
    <line x1="1020" y1="40"  x2="1020" y2="590"/>
  </g>

  <!-- VS divider line (center) -->
  <line x1="600" y1="80" x2="600" y2="560" stroke="#1E293B" stroke-width="2" stroke-dasharray="6 4"/>

  <!-- VS badge -->
  <circle cx="600" cy="315" r="28" fill="#0A1628" stroke="#1E293B" stroke-width="2"/>
  <text x="600" y="322" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="15" font-weight="800" fill="#94A3B8">VS</text>

  <!-- Left side: Gemini -->
  <text x="300" y="140" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="13" font-weight="600" fill="#94A3B8" letter-spacing="2">GEMINI 2.5 FLASH</text>
  <text x="300" y="186" text-anchor="middle" font-family="'DM Sans','Inter','Helvetica Neue',sans-serif" font-size="52" font-weight="800" fill="#4285F4">Gemini</text>
  <text x="300" y="232" text-anchor="middle" font-family="'DM Sans','Inter','Helvetica Neue',sans-serif" font-size="52" font-weight="800" fill="#4285F4">2.5 Flash</text>

  <!-- Gemini attributes -->
  <g font-family="'DM Sans','Inter',sans-serif" font-size="13" fill="#94A3B8" text-anchor="middle">
    <text x="300" y="285">Fast inference</text>
    <text x="300" y="308">Long context window</text>
    <text x="300" y="331">Lower cost / token</text>
    <text x="300" y="354">Multimodal native</text>
  </g>

  <!-- Right side: Claude -->
  <text x="900" y="140" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="13" font-weight="600" fill="#94A3B8" letter-spacing="2">CLAUDE 3.7 SONNET</text>
  <text x="900" y="186" text-anchor="middle" font-family="'DM Sans','Inter','Helvetica Neue',sans-serif" font-size="52" font-weight="800" fill="#CC785C">Claude</text>
  <text x="900" y="232" text-anchor="middle" font-family="'DM Sans','Inter','Helvetica Neue',sans-serif" font-size="52" font-weight="800" fill="#CC785C">3.7 Sonnet</text>

  <!-- Claude attributes -->
  <g font-family="'DM Sans','Inter',sans-serif" font-size="13" fill="#94A3B8" text-anchor="middle">
    <text x="900" y="285">Instruction following</text>
    <text x="900" y="308">Consistent output quality</text>
    <text x="900" y="331">Safer refusal behavior</text>
    <text x="900" y="354">Agentic reliability</text>
  </g>

  <!-- Winner callout -->
  <rect x="390" y="408" width="420" height="54" rx="10" fill="#1E293B"/>
  <text x="600" y="430" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="11" font-weight="600" fill="#E8320A" letter-spacing="1">4 PRODUCTION CONSTRAINTS DECIDED IT</text>
  <text x="600" y="450" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="13" fill="#FAFAFA">Real evaluation. No benchmark theater.</text>

  <!-- Bottom divider + category -->
  <line x1="40" y1="482" x2="1160" y2="482" stroke="#1E293B" stroke-width="1"/>

  <text x="80"  y="508" font-family="'DM Sans','Inter',sans-serif" font-size="14" font-weight="600" fill="#E8320A" letter-spacing="3">ENGINEERING  ·  MARCH 2026</text>
  <text x="80"  y="532" font-family="'DM Sans','Inter',sans-serif" font-size="13" fill="#94A3B8">Agentic engine evaluation for production use</text>
  <text x="80"  y="554" font-family="'DM Sans','Inter',sans-serif" font-size="13" fill="#94A3B8">6 min read</text>

  <!-- Wordmark -->
  <text x="80"  y="598" font-family="'DM Sans','Inter',sans-serif" font-size="13" font-weight="700" fill="#E8320A" letter-spacing="3">OZIGI</text>
  <text x="136" y="598" font-family="'DM Sans','Inter',sans-serif" font-size="13" fill="#94A3B8" opacity="0.7">  ·  blog.ozigi.app</text>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="#E8320A"/>
</svg>
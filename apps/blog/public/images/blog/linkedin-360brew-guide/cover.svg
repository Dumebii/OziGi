<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#070E1C"/>
      <stop offset="100%" stop-color="#0F1E35"/>
    </linearGradient>
    <radialGradient id="glow" cx="75%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#0A66C2" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#0A66C2" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="15%" cy="25%" r="35%">
      <stop offset="0%" stop-color="#E8320A" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0A1628" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Grid lines right side -->
  <g stroke="#1E293B" stroke-width="1" opacity="0.5">
    <line x1="600" y1="60"  x2="1160" y2="60"/>
    <line x1="600" y1="150" x2="1160" y2="150"/>
    <line x1="600" y1="240" x2="1160" y2="240"/>
    <line x1="600" y1="330" x2="1160" y2="330"/>
    <line x1="600" y1="420" x2="1160" y2="420"/>
    <line x1="600" y1="510" x2="1160" y2="510"/>
    <line x1="600" y1="600" x2="1160" y2="600"/>
    <line x1="640"  y1="40" x2="640"  y2="590"/>
    <line x1="730"  y1="40" x2="730"  y2="590"/>
    <line x1="820"  y1="40" x2="820"  y2="590"/>
    <line x1="910"  y1="40" x2="910"  y2="590"/>
    <line x1="1000" y1="40" x2="1000" y2="590"/>
    <line x1="1090" y1="40" x2="1090" y2="590"/>
  </g>

  <!-- Circuit traces -->
  <g fill="none" stroke="#1E3A5F" stroke-width="1.5" opacity="0.6">
    <path d="M730 60 L730 150 L820 150 L820 240"/>
    <path d="M910 60 L910 150 L1000 150 L1000 240 L1090 240"/>
    <path d="M640 240 L640 330 L730 330 L730 420"/>
    <path d="M820 330 L910 330 L910 420 L1000 420"/>
    <path d="M640 420 L640 510 L730 510 L730 600"/>
    <path d="M1000 510 L1090 510"/>
  </g>

  <!-- Node dots -->
  <g fill="#1E3A5F" opacity="0.9">
    <circle cx="730" cy="150" r="4"/>
    <circle cx="820" cy="240" r="4"/>
    <circle cx="910" cy="150" r="4"/>
    <circle cx="730" cy="330" r="4"/>
    <circle cx="910" cy="420" r="4"/>
    <circle cx="730" cy="510" r="4"/>
  </g>

  <!-- Active nodes - LinkedIn blue -->
  <g fill="#0A66C2" opacity="0.9">
    <circle cx="1000" cy="150" r="6"/>
    <circle cx="820" cy="330" r="6"/>
    <circle cx="1090" cy="510" r="6"/>
  </g>
  <g fill="none" stroke="#0A66C2" stroke-width="1" opacity="0.3">
    <circle cx="1000" cy="150" r="14"/>
    <circle cx="820" cy="330" r="14"/>
    <circle cx="1090" cy="510" r="14"/>
  </g>
  <path d="M910 60 L910 150 L1000 150" fill="none" stroke="#0A66C2" stroke-width="1.5" opacity="0.5"/>
  <path d="M640 330 L820 330" fill="none" stroke="#0A66C2" stroke-width="1.5" opacity="0.4"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="#E8320A"/>

  <!-- Category label -->
  <text x="80" y="118" font-family="'DM Sans','Inter','Helvetica Neue',sans-serif" font-size="14" font-weight="600" fill="#E8320A" letter-spacing="3">MARKETING GUIDE  ·  APRIL 2026</text>

  <!-- Title -->
  <text x="80" y="210" font-family="'DM Sans','Inter','Helvetica Neue',sans-serif" font-size="72" font-weight="800" fill="#FAFAFA">LinkedIn in</text>
  <text x="80" y="295" font-family="'DM Sans','Inter','Helvetica Neue',sans-serif" font-size="72" font-weight="800" fill="#FAFAFA">2026 is</text>
  <text x="80" y="380" font-family="'DM Sans','Inter','Helvetica Neue',sans-serif" font-size="72" font-weight="800" fill="#0A66C2">different.</text>

  <!-- Subtitle -->
  <text x="80" y="430" font-family="'DM Sans','Inter','Helvetica Neue',sans-serif" font-size="26" font-weight="400" fill="#94A3B8">How to stand out under the</text>
  <text x="80" y="464" font-family="'DM Sans','Inter','Helvetica Neue',sans-serif" font-size="26" font-weight="400" fill="#94A3B8">360Brew algorithm</text>

  <!-- Divider -->
  <line x1="80" y1="494" x2="460" y2="494" stroke="#1E293B" stroke-width="1"/>

  <!-- Stat pills -->
  <rect x="80"  y="510" width="168" height="36" rx="18" fill="#1E293B"/>
  <text x="164" y="533" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="13" font-weight="500" fill="#FAFAFA">50% organic reach drop</text>
  <rect x="260" y="510" width="138" height="36" rx="18" fill="#1E293B"/>
  <text x="329" y="533" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="13" font-weight="500" fill="#FAFAFA">11 min read</text>

  <!-- Wordmark -->
  <text x="80"  y="598" font-family="'DM Sans','Inter',sans-serif" font-size="13" font-weight="700" fill="#E8320A" letter-spacing="3">OZIGI</text>
  <text x="136" y="598" font-family="'DM Sans','Inter',sans-serif" font-size="13" fill="#94A3B8" opacity="0.7">  ·  blog.ozigi.app</text>
</svg>
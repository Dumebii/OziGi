<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#070E1C"/>
      <stop offset="100%" stop-color="#0F1E35"/>
    </linearGradient>
    <radialGradient id="glow" cx="72%" cy="50%" r="42%">
      <stop offset="0%" stop-color="#E8320A" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#E8320A" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Grid -->
  <g stroke="#1E293B" stroke-width="1" opacity="0.5">
    <line x1="580" y1="70"  x2="1160" y2="70"/>
    <line x1="580" y1="160" x2="1160" y2="160"/>
    <line x1="580" y1="250" x2="1160" y2="250"/>
    <line x1="580" y1="340" x2="1160" y2="340"/>
    <line x1="580" y1="430" x2="1160" y2="430"/>
    <line x1="580" y1="520" x2="1160" y2="520"/>
    <line x1="620"  y1="40" x2="620"  y2="590"/>
    <line x1="710"  y1="40" x2="710"  y2="590"/>
    <line x1="800"  y1="40" x2="800"  y2="590"/>
    <line x1="890"  y1="40" x2="890"  y2="590"/>
    <line x1="980"  y1="40" x2="980"  y2="590"/>
    <line x1="1070" y1="40" x2="1070" y2="590"/>
    <line x1="1160" y1="40" x2="1160" y2="590"/>
  </g>

  <!-- Circuit traces - red alert theme -->
  <g fill="none" stroke="#3A1A1A" stroke-width="1.5" opacity="0.8">
    <path d="M800 70 L800 160 L890 160 L890 250 L980 250"/>
    <path d="M710 160 L710 250 L800 250 L800 340"/>
    <path d="M980 340 L1070 340 L1070 430"/>
    <path d="M620 340 L620 430 L710 430 L710 520"/>
    <path d="M890 430 L980 430 L980 520 L1070 520"/>
  </g>

  <!-- Active nodes - ember red -->
  <g fill="#E8320A" opacity="0.9">
    <circle cx="890"  cy="160" r="6"/>
    <circle cx="800"  cy="340" r="6"/>
    <circle cx="1070" cy="430" r="6"/>
    <circle cx="980"  cy="520" r="6"/>
  </g>
  <g fill="none" stroke="#E8320A" stroke-width="1" opacity="0.3">
    <circle cx="890"  cy="160" r="14"/>
    <circle cx="800"  cy="340" r="14"/>
    <circle cx="1070" cy="430" r="14"/>
    <circle cx="980"  cy="520" r="14"/>
  </g>
  <g fill="#1E3A5F" opacity="0.7">
    <circle cx="800" cy="160" r="4"/>
    <circle cx="710" cy="250" r="4"/>
    <circle cx="980" cy="250" r="4"/>
    <circle cx="710" cy="430" r="4"/>
  </g>

  <!-- Alert highlight traces -->
  <path d="M800 70 L800 160 L890 160" fill="none" stroke="#E8320A" stroke-width="2" opacity="0.6"/>
  <path d="M980 340 L1070 340 L1070 430" fill="none" stroke="#E8320A" stroke-width="2" opacity="0.5"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="#E8320A"/>

  <!-- Alert badge -->
  <rect x="80" y="88" width="106" height="30" rx="6" fill="#E8320A"/>
  <text x="133" y="108" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="12" font-weight="700" fill="#FAFAFA" letter-spacing="1">SECURITY</text>
  <text x="200" y="108" font-family="'DM Sans','Inter',sans-serif" font-size="12" fill="#94A3B8" letter-spacing="2">·  APRIL 2026</text>

  <!-- Title -->
  <text x="80" y="200" font-family="'DM Sans','Inter','Helvetica Neue',sans-serif" font-size="74" font-weight="800" fill="#FAFAFA">Vercel got</text>
  <text x="80" y="288" font-family="'DM Sans','Inter','Helvetica Neue',sans-serif" font-size="74" font-weight="800" fill="#E8320A">breached.</text>
  <text x="80" y="372" font-family="'DM Sans','Inter','Helvetica Neue',sans-serif" font-size="42" font-weight="700" fill="#FAFAFA">Here's what to do.</text>

  <!-- Subtitle -->
  <text x="80" y="422" font-family="'DM Sans','Inter','Helvetica Neue',sans-serif" font-size="24" font-weight="400" fill="#94A3B8">April 19, 2026 incident — plain English guide</text>
  <text x="80" y="454" font-family="'DM Sans','Inter','Helvetica Neue',sans-serif" font-size="24" font-weight="400" fill="#94A3B8">to securing your account now.</text>

  <!-- Divider -->
  <line x1="80" y1="484" x2="500" y2="484" stroke="#1E293B" stroke-width="1"/>

  <!-- Stat pills -->
  <rect x="80"  y="500" width="164" height="36" rx="18" fill="#1E293B"/>
  <text x="162" y="523" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="13" font-weight="500" fill="#FAFAFA">Env vars exposed</text>
  <rect x="256" y="500" width="140" height="36" rx="18" fill="#1E293B"/>
  <text x="326" y="523" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="13" font-weight="500" fill="#FAFAFA">No expertise needed</text>

  <!-- Wordmark -->
  <text x="80"  y="598" font-family="'DM Sans','Inter',sans-serif" font-size="13" font-weight="700" fill="#E8320A" letter-spacing="3">OZIGI</text>
  <text x="136" y="598" font-family="'DM Sans','Inter',sans-serif" font-size="13" fill="#94A3B8" opacity="0.7">  ·  blog.ozigi.app</text>
</svg>
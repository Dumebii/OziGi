<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#070E1C"/>
      <stop offset="100%" stop-color="#0A1A2E"/>
    </linearGradient>
    <radialGradient id="glow" cx="72%" cy="50%" r="38%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Grid -->
  <g stroke="#1E293B" stroke-width="1" opacity="0.45">
    <line x1="580" y1="70"  x2="1160" y2="70"/>
    <line x1="580" y1="160" x2="1160" y2="160"/>
    <line x1="580" y1="250" x2="1160" y2="250"/>
    <line x1="580" y1="340" x2="1160" y2="340"/>
    <line x1="580" y1="430" x2="1160" y2="430"/>
    <line x1="580" y1="520" x2="1160" y2="520"/>
    <line x1="630"  y1="40" x2="630"  y2="590"/>
    <line x1="720"  y1="40" x2="720"  y2="590"/>
    <line x1="810"  y1="40" x2="810"  y2="590"/>
    <line x1="900"  y1="40" x2="900"  y2="590"/>
    <line x1="990"  y1="40" x2="990"  y2="590"/>
    <line x1="1080" y1="40" x2="1080" y2="590"/>
  </g>

  <!-- Webhook flow visual: Inbound → Validate → Queue → Retry -->
  <!-- Step boxes -->
  <rect x="630" y="90"  width="130" height="44" rx="6" fill="#1E293B" stroke="#1E3A5F" stroke-width="1"/>
  <text x="695" y="117" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="12" fill="#94A3B8">Inbound event</text>

  <rect x="630" y="190" width="130" height="44" rx="6" fill="#1E293B" stroke="#10B981" stroke-width="1.5"/>
  <text x="695" y="217" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="12" font-weight="600" fill="#10B981">Validate sig</text>

  <rect x="630" y="290" width="130" height="44" rx="6" fill="#1E293B" stroke="#10B981" stroke-width="1.5"/>
  <text x="695" y="317" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="12" font-weight="600" fill="#10B981">Queue async</text>

  <rect x="630" y="390" width="130" height="44" rx="6" fill="#1E293B" stroke="#E8320A" stroke-width="1.5"/>
  <text x="695" y="417" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="12" font-weight="600" fill="#E8320A">Retry + backoff</text>

  <rect x="630" y="490" width="130" height="44" rx="6" fill="#1E293B" stroke="#1E3A5F" stroke-width="1"/>
  <text x="695" y="517" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="12" fill="#94A3B8">Idempotent ack</text>

  <!-- Connector arrows -->
  <line x1="695" y1="134" x2="695" y2="188" stroke="#1E3A5F" stroke-width="1.5"/>
  <polygon points="695,188 690,178 700,178" fill="#1E3A5F"/>
  <line x1="695" y1="234" x2="695" y2="288" stroke="#10B981" stroke-width="1.5" opacity="0.7"/>
  <polygon points="695,288 690,278 700,278" fill="#10B981" opacity="0.7"/>
  <line x1="695" y1="334" x2="695" y2="388" stroke="#10B981" stroke-width="1.5" opacity="0.7"/>
  <polygon points="695,388 690,378 700,378" fill="#10B981" opacity="0.7"/>
  <line x1="695" y1="434" x2="695" y2="488" stroke="#E8320A" stroke-width="1.5" opacity="0.6"/>
  <polygon points="695,488 690,478 700,478" fill="#E8320A" opacity="0.6"/>

  <!-- Side labels -->
  <text x="790" y="215" font-family="'DM Sans','Inter',sans-serif" font-size="11" fill="#94A3B8">HMAC-SHA256</text>
  <text x="790" y="315" font-family="'DM Sans','Inter',sans-serif" font-size="11" fill="#94A3B8">Bull / Redis</text>
  <text x="790" y="415" font-family="'DM Sans','Inter',sans-serif" font-size="11" fill="#94A3B8">Exp. backoff</text>

  <!-- Circuit traces background -->
  <g fill="none" stroke="#1E2A3F" stroke-width="1" opacity="0.4">
    <path d="M900 70 L900 160 L990 160 L990 250"/>
    <path d="M1080 160 L1080 250 L990 250"/>
    <path d="M900 340 L990 340 L990 430 L1080 430"/>
    <path d="M900 430 L900 520 L990 520"/>
  </g>
  <g fill="#1E3A5F" opacity="0.7">
    <circle cx="900" cy="160" r="4"/>
    <circle cx="990" cy="250" r="4"/>
    <circle cx="990" cy="430" r="4"/>
    <circle cx="900" cy="520" r="4"/>
  </g>
  <g fill="#10B981" opacity="0.7">
    <circle cx="1080" cy="250" r="5"/>
    <circle cx="1080" cy="430" r="5"/>
  </g>
  <g fill="none" stroke="#10B981" stroke-width="1" opacity="0.25">
    <circle cx="1080" cy="250" r="12"/>
    <circle cx="1080" cy="430" r="12"/>
  </g>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="#E8320A"/>

  <!-- Category -->
  <text x="80" y="118" font-family="'DM Sans','Inter',sans-serif" font-size="14" font-weight="600" fill="#E8320A" letter-spacing="3">ENGINEERING  ·  APRIL 2026</text>

  <!-- Title -->
  <text x="80" y="210" font-family="'DM Sans','Inter','Helvetica Neue',sans-serif" font-size="68" font-weight="800" fill="#FAFAFA">Robust</text>
  <text x="80" y="292" font-family="'DM Sans','Inter','Helvetica Neue',sans-serif" font-size="68" font-weight="800" fill="#FAFAFA">Webhook</text>
  <text x="80" y="374" font-family="'DM Sans','Inter','Helvetica Neue',sans-serif" font-size="68" font-weight="800" fill="#10B981">Handlers.</text>

  <!-- Subtitle -->
  <text x="80" y="420" font-family="'DM Sans','Inter',sans-serif" font-size="23" fill="#94A3B8">Validation, queuing, and retry logic</text>
  <text x="80" y="452" font-family="'DM Sans','Inter',sans-serif" font-size="23" fill="#94A3B8">in Node.js — the full picture.</text>

  <!-- Divider -->
  <line x1="80" y1="478" x2="460" y2="478" stroke="#1E293B" stroke-width="1"/>

  <!-- Pills -->
  <rect x="80"  y="494" width="120" height="36" rx="18" fill="#1E293B"/>
  <text x="140" y="517" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="13" fill="#FAFAFA">8 min read</text>
  <rect x="212" y="494" width="130" height="36" rx="18" fill="#1E293B"/>
  <text x="277" y="517" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="13" fill="#FAFAFA">Node.js guide</text>

  <!-- Wordmark -->
  <text x="80"  y="598" font-family="'DM Sans','Inter',sans-serif" font-size="13" font-weight="700" fill="#E8320A" letter-spacing="3">OZIGI</text>
  <text x="136" y="598" font-family="'DM Sans','Inter',sans-serif" font-size="13" fill="#94A3B8" opacity="0.7">  ·  blog.ozigi.app</text>
</svg>
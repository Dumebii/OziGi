<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#070E1C"/>
      <stop offset="100%" stop-color="#0F1E35"/>
    </linearGradient>
    <radialGradient id="glow" cx="70%" cy="55%" r="40%">
      <stop offset="0%" stop-color="#E8320A" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#E8320A" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Grid -->
  <g stroke="#1E293B" stroke-width="1" opacity="0.45">
    <line x1="580" y1="70"  x2="1160" y2="70"/>
    <line x1="580" y1="160" x2="1160" y2="160"/>
    <line x1="580" y1="250" x2="1160" y2="250"/>
    <line x1="580" y1="340" x2="1160" y2="340"/>
    <line x1="580" y1="430" x2="1160" y2="430"/>
    <line x1="580" y1="520" x2="1160" y2="520"/>
    <line x1="630"  y1="40" x2="630"  y2="590"/>
    <line x1="720"  y1="40" x2="720"  y2="590"/>
    <line x1="810"  y1="40" x2="810"  y2="590"/>
    <line x1="900"  y1="40" x2="900"  y2="590"/>
    <line x1="990"  y1="40" x2="990"  y2="590"/>
    <line x1="1080" y1="40" x2="1080" y2="590"/>
  </g>

  <!-- Engagement bar chart visual (right side) -->
  <!-- Bar chart: low bar vs high bar comparison -->
  <!-- Low bar - muted -->
  <rect x="680" y="380" width="70" height="160" rx="4" fill="#1E293B" stroke="#1E3A5F" stroke-width="1"/>
  <text x="715" y="370" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="12" fill="#94A3B8">4 likes</text>

  <!-- High bar - ember -->
  <rect x="820" y="160" width="70" height="380" rx="4" fill="#E8320A" opacity="0.85"/>
  <text x="855" y="148" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="12" font-weight="600" fill="#E8320A">1.2k likes</text>

  <!-- Bar 3 - mid -->
  <rect x="960" y="260" width="70" height="280" rx="4" fill="#1E293B" stroke="#94A3B8" stroke-width="1" opacity="0.7"/>
  <text x="995" y="248" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="12" fill="#94A3B8">480 views</text>

  <!-- X axis -->
  <line x1="650" y1="540" x2="1100" y2="540" stroke="#1E293B" stroke-width="1.5"/>

  <!-- Axis labels -->
  <text x="715"  y="558" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="11" fill="#94A3B8">Before</text>
  <text x="855"  y="558" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="11" fill="#E8320A">After</text>
  <text x="995"  y="558" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="11" fill="#94A3B8">Average</text>

  <!-- Circuit nodes -->
  <g fill="none" stroke="#1E2A3F" stroke-width="1" opacity="0.4">
    <path d="M1080 70 L1080 160"/>
    <path d="M1080 250 L1080 340 L990 340"/>
    <path d="M990 430 L990 520"/>
  </g>
  <g fill="#1E3A5F" opacity="0.7">
    <circle cx="1080" cy="160" r="4"/>
    <circle cx="990"  cy="340" r="4"/>
    <circle cx="990"  cy="520" r="4"/>
  </g>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="#E8320A"/>

  <!-- Category -->
  <text x="80" y="118" font-family="'DM Sans','Inter',sans-serif" font-size="14" font-weight="600" fill="#E8320A" letter-spacing="3">CONTENT  ·  MARCH 2026</text>

  <!-- Title -->
  <text x="80" y="205" font-family="'DM Sans','Inter','Helvetica Neue',sans-serif" font-size="74" font-weight="800" fill="#FAFAFA">Your launch</text>
  <text x="80" y="290" font-family="'DM Sans','Inter','Helvetica Neue',sans-serif" font-size="74" font-weight="800" fill="#FAFAFA">post got</text>
  <text x="80" y="375" font-family="'DM Sans','Inter','Helvetica Neue',sans-serif" font-size="74" font-weight="800" fill="#E8320A">4 likes.</text>

  <!-- Subtitle -->
  <text x="80" y="422" font-family="'DM Sans','Inter',sans-serif" font-size="24" fill="#94A3B8">Your product deserved better.</text>
  <text x="80" y="456" font-family="'DM Sans','Inter',sans-serif" font-size="24" fill="#94A3B8">Here's how to fix your content system.</text>

  <!-- Divider -->
  <line x1="80" y1="480" x2="460" y2="480" stroke="#1E293B" stroke-width="1"/>

  <!-- Pills -->
  <rect x="80"  y="496" width="120" height="36" rx="18" fill="#1E293B"/>
  <text x="140" y="519" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="13" fill="#FAFAFA">8 min read</text>
  <rect x="212" y="496" width="156" height="36" rx="18" fill="#1E293B"/>
  <text x="290" y="519" text-anchor="middle" font-family="'DM Sans','Inter',sans-serif" font-size="13" fill="#FAFAFA">For technical founders</text>

  <!-- Wordmark -->
  <text x="80"  y="598" font-family="'DM Sans','Inter',sans-serif" font-size="13" font-weight="700" fill="#E8320A" letter-spacing="3">OZIGI</text>
  <text x="136" y="598" font-family="'DM Sans','Inter',sans-serif" font-size="13" fill="#94A3B8" opacity="0.7">  ·  blog.ozigi.app</text>
</svg>